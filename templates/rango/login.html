{% extends "rango/base.html" %}

{% block titleblock %}Login{% endblock %}

{% block content %}
{% block nav_block %}
<h1>Login</h1>

<form method="post" action=".">
    {% csrf_token %}
    {{ form.as_p }}

    <input type="submit" value="Log in">
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
</form>

<p>
    Not registered?
    <a href="{% url 'rango:registration' %}">Register here</a>
</p>
{% endblock %}
{% endblock %}
