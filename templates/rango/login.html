{% extends "rango/base.html" %}

{% block titleblock %}Login{% endblock %}

{% block nav_block %}{% endblock %}

{% block content %}
<h1>Login</h1>

<form method="post" action=".">
    {% csrf_token %}
    Username: <input type="text" name="username" size="50"/><br />
    Password: <input type="password" name="password" size="50"/><br />
    <input type="submit" value="Log in">
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
</form>

<p>
    Not registered?
    <a href="{% url 'rango:registration' %}">Register here</a>
</p>
{% endblock %}
