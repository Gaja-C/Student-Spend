{% extends "rango/base.html" %}

{% block titleblock %}Register{% endblock %}

{% block content %}
{% block nav_block %}
<h1>Create an account</h1>

<form method="post" action=".">
    {% csrf_token %}
    {{ form.as_p }}

    <input type="submit" value="Register">
</form>

<p>
    Already have an account?
    <a href="{% url 'rango:login' %}">Log in</a>
</p>
{% endblock %}
{% endblock %}
